apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic-deployment
  namespace: arc
  labels:
    app: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata: 
      labels:
        app: petclinic
    spec:
      containers: 
       - name: petclinic
         image: cmelerom/app:v2
         ports:
         - containerPort: 9966
---
apiVersion: v1
kind: Service
metadata:
  name: petclinic-service
  namespace: arc
spec:
  type: NodePort
  selector:
    app: petclinic
  ports:
  - port: 8080
    targetPort: 9966